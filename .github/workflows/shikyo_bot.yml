name: Fits Shikyo Auto Bot

on:
  schedule:
    # 協定世界時(UTC)で設定します。
    # 日本時間(JST) 09:00 = UTC 00:00 です。
    # 形式：'分 時 日 月 曜日'
    # 曜日の数字：2=火、4=木、6=土
    - cron: '0 0 * * 2,4,6'
  workflow_dispatch: # これがあると、ボタンからいつでも手動で動かせます

jobs:
  build:
    runs-on: ubuntu-latest
    # ここに環境変数を追加して警告を消す
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 1. リポジトリのプログラムを読み込む
      - uses: actions/checkout@v4
      
      # 2. Pythonの環境を作る
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # 3. 必要なライブラリ(Selenium等)をインストール
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      # 4. Pythonプログラムを実行
      - name: Run script
        env:
          # GitHubの「Secrets」に保存したパスワード等をプログラムに渡す
          FITS_ID: ${{ secrets.FITS_ID }}
          FITS_PW: ${{ secrets.FITS_PW }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: python fits_shikyo.py
